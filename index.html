<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="h-[850px] bg-[#E9F3F5] p-[10px] lg:h-[700px]">
      <section class="max-w-[1200px] bg-white h-[50px] rounded-[30px] flex p-[15px] justify-between items-center m-auto"
      >
        <div>
          <img src="./images/logo.png" alt="" />
        </div>
        <nav class="hidden lg:block lg:flex gap-[35px]">
          <p>Чему вы научитесь</p>
          <p>Процесс обучения</p>
          <p>Стоимость</p>
          <p>Контакты</p>
        </nav>
        <div class="flex gap-[15px]">
          <button class="hidden lg:block">Регистрация</button>
          <button
            class="bg-[#38BFF2] rounded-[25px] py-[8px] px-[18px] text-[white]"
          >
            <i class="fa-solid fa-arrow-right"></i>Войти
          </button>
        </div>
        <div class="lg:hidden">
          <img src="./images/Group 1201.png" alt="" />
        </div>
      </section>
      <section class="max-w-[1200px] flex flex-col mx-[20px] my-[15px] gap-[80px] items-center lg:flex-row lg:m-auto lg:my-[80px]">
        <div class="max-w-[600px] m-auto flex flex-col gap-[15px] items-center">
          <p class="text-center  text-[24px] font-[500] border-b py-[20px] lg:text-[46px] lg:text-justify">
            Школа <strong>программирования</strong> для тех, кому нужны реальные навыки, а не
            просто сертификат
          </p>
          <p class="text-center text-[#22253B] text-[14px]">Пройдите тестирование, чтобы получить доступ к бесплатным вводным урокам</p>
          <button class="flex bg-[#F15525] text-[white] px-[60px] py-[25px] items-center rounded-[80px] text-[18px]">Пройти тестирование
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>
        <div class="">
            <img src="./images/Layer 2.png" alt="">
        </div>
      </section>
    </header>
  </body>
</html>
